apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbital-backend
  labels:
    app.kubernetes.io/name: orbital-backend
    app.kubernetes.io/part-of: orbital-control-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orbital-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orbital-backend
        app.kubernetes.io/part-of: orbital-control-platform
    spec:
      containers:
        - name: backend
          image: orbital-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: orbital-config
            - secretRef:
                name: orbital-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
