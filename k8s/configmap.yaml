apiVersion: v1
kind: ConfigMap
metadata:
  name: orbital-config
  labels:
    app.kubernetes.io/name: orbital-neural-control
    app.kubernetes.io/part-of: orbital-control-platform
data:
  DB_BACKEND: "postgres"
  SQLITE_PATH: "/workspace/artifacts/experiments.sqlite"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "orbital"
  ORBITAL_BACKEND_PORT: "8080"
  ORBITAL_ARTIFACT_ROOT: "/workspace/artifacts"
  ORBITAL_REPO_ROOT: "/workspace"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
