services:
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: orbital
      POSTGRES_USER: orbital
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orbital_local_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/persistence/migrations/postgres_init.sql:/docker-entrypoint-initdb.d/001-orbital-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbital -d orbital"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: python:3.12-slim
    working_dir: /workspace
    command: >
      bash -lc "pip install --no-cache-dir mlflow==2.17.0 &&
      mlflow server
      --backend-store-uri sqlite:////workspace/artifacts/mlflow/mlflow.db
      --default-artifact-root /workspace/artifacts/mlflow-artifacts
      --host 0.0.0.0 --port 5000"
    volumes:
      - ./artifacts:/workspace/artifacts
    ports:
      - "5000:5000"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      ORBITAL_BACKEND_PORT: "8080"
      ORBITAL_ARTIFACT_ROOT: "/workspace/artifacts"
      DB_BACKEND: "${DB_BACKEND:-sqlite}"
      SQLITE_PATH: "/workspace/artifacts/experiments.sqlite"
      ORBITAL_SQLITE_PATH: "/workspace/artifacts/experiments.sqlite"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: "${POSTGRES_DB:-orbital}"
      POSTGRES_USER: "${POSTGRES_USER:-orbital}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-orbital_local_password}"
      ORBITAL_REPO_ROOT: "/workspace"
      ORBITAL_JOB_EXECUTOR: "0"
    volumes:
      - ./artifacts:/workspace/artifacts:rw
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      VITE_BACKEND_HTTP: "http://localhost:8080"
      VITE_BACKEND_WS: "ws://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  fastapi-serving:
    build:
      context: services/fastapi-serving
      dockerfile: Dockerfile
    profiles: ["api"]
    environment:
      ORBITAL_CPP_CONTROL_ENDPOINT: ""
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  cpp-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.cpp-dev
    image: orbital-neural-control-cpp-cpp-dev:latest
    working_dir: /workspace
    volumes:
      - ./artifacts:/workspace/artifacts
    command: ["bash", "-lc", "./build/nmc benchmark --quick --name compose_smoke && tail -f /dev/null"]

  training:
    build:
      context: .
      dockerfile: docker/Dockerfile.cpp-dev
    image: orbital-neural-control-cpp-cpp-dev:latest
    working_dir: /workspace
    command:
      [
        "python3",
        "mlops/train_with_mlflow.py",
        "--tracking-uri",
        "http://mlflow:5000",
        "--experiment",
        "orbital_ppo",
        "--run-id",
        "compose_train",
        "--seed",
        "7",
        "--updates",
        "30",
        "--num-envs",
        "16",
        "--env",
        "point_mass",
        "--binary",
        "./build/nmc",
        "--export-onnx"
      ]
    volumes:
      - ./artifacts:/workspace/artifacts
    depends_on:
      - mlflow

  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    ports:
      - "6379:6379"

volumes:
  postgres-data:
