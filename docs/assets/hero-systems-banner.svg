  <text x="86" y="120" fill="#3ADAA3" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">C++20 RL SYSTEMS FOUNDATION</text>
  <text x="86" y="206" fill="#EEF6FF" font-family="DejaVu Sans, Arial, sans-serif" font-size="58" font-weight="700">PPO Neural Control C++</text>
  <text x="86" y="266" fill="#B9CBE0" font-family="DejaVu Sans, Arial, sans-serif" font-size="28">Policy optimization, reproducible benchmarking, and experiment telemetry</text>
  <text x="86" y="306" fill="#93AACA" font-family="DejaVu Sans, Arial, sans-serif" font-size="24">LibTorch CPU backend, SQLite tracking, layered architecture, and extensible simulation interfaces.</text>

