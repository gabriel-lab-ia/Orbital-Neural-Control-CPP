  <rect width="1600" height="560" rx="30" fill="url(#bg)"/>
  <circle cx="248" cy="116" r="200" fill="url(#glowBlue)"/>
  <circle cx="1388" cy="426" r="220" fill="url(#glowGreen)"/>

  <g opacity="0.28" stroke="#203349" stroke-width="1">
    <path d="M80 480H1520"/>
    <path d="M80 432H1520"/>
    <path d="M80 384H1520"/>
    <path d="M80 336H1520"/>
    <path d="M80 288H1520"/>
    <path d="M80 240H1520"/>
