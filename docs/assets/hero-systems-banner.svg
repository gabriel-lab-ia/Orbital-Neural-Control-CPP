<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PPO Neural Control systems hero</title>
  <desc id="desc">Dark technical banner showing C plus plus reinforcement learning systems architecture, telemetry, and reproducible experiment operations.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1500" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060D16"/>
      <stop offset="0.5" stop-color="#0B1625"/>
      <stop offset="1" stop-color="#070B12"/>
    </linearGradient>
    <linearGradient id="lineA" x1="128" y1="436" x2="1030" y2="436" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2C7DFF"/>
      <stop offset="1" stop-color="#3CE6A8"/>
    </linearGradient>
    <linearGradient id="lineB" x1="1124" y1="130" x2="1480" y2="330" gradientUnits="userSpaceOnUse">
