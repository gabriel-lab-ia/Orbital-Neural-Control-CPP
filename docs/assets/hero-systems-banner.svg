    </radialGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1388 426) rotate(90) scale(220)">
      <stop stop-color="#35DFA3" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#35DFA3" stop-opacity="0"/>
    </radialGradient>
