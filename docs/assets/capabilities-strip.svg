<svg width="1600" height="320" viewBox="0 0 1600 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Core capabilities strip</title>
  <desc id="desc">Capabilities panel showing architecture, reproducibility, benchmarking, and extensible inference design.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="30" x2="1520" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111A"/>
      <stop offset="1" stop-color="#0A1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="62" x2="1440" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4AA3FF"/>
      <stop offset="1" stop-color="#3BDEA6"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="320" rx="24" fill="url(#bg)"/>
  <path d="M124 62H1474" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <text x="124" y="46" fill="#94B1D1" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2">SYSTEM CAPABILITIES</text>

  <g>
    <rect x="124" y="92" width="330" height="188" rx="18" fill="#0B1725" stroke="#243A50"/>
    <text x="150" y="132" fill="#EAF4FF" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700">Layered architecture</text>
    <text x="150" y="164" fill="#A9C0DC" font-family="DejaVu Sans, Arial, sans-serif" font-size="19">domain / application /</text>
    <text x="150" y="190" fill="#A9C0DC" font-family="DejaVu Sans, Arial, sans-serif" font-size="19">infrastructure / interfaces</text>
    <text x="150" y="228" fill="#84A0C2" font-family="DejaVu Sans, Arial, sans-serif" font-size="17">explicit boundaries and ownership</text>
  </g>

  <g>
    <rect x="478" y="92" width="330" height="188" rx="18" fill="#0B1725" stroke="#243A50"/>
    <text x="504" y="132" fill="#EAF4FF" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700">Experiment discipline</text>
    <text x="504" y="164" fill="#A9C0DC" font-family="DejaVu Sans, Arial, sans-serif" font-size="19">run manifests, checkpoints,</text>
    <text x="504" y="190" fill="#A9C0DC" font-family="DejaVu Sans, Arial, sans-serif" font-size="19">versioned benchmark reports</text>
    <text x="504" y="228" fill="#84A0C2" font-family="DejaVu Sans, Arial, sans-serif" font-size="17">reproducibility as a first-class concern</text>
  </g>

  <g>
    <rect x="832" y="92" width="330" height="188" rx="18" fill="#0B1725" stroke="#243A50"/>
    <text x="858" y="132" fill="#EAF4FF" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700">SQLite telemetry</text>
    <text x="858" y="164" fill="#A9C0DC" font-family="DejaVu Sans, Arial, sans-serif" font-size="19">runs, episodes, events,</text>
    <text x="858" y="190" fill="#A9C0DC" font-family="DejaVu Sans, Arial, sans-serif" font-size="19">benchmark summaries</text>
    <text x="858" y="228" fill="#84A0C2" font-family="DejaVu Sans, Arial, sans-serif" font-size="17">local-first traceability</text>
  </g>

  <g>
    <rect x="1186" y="92" width="290" height="188" rx="18" fill="#0B1725" stroke="#243A50"/>
    <text x="1212" y="132" fill="#EAF4FF" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700">Future backend path</text>
    <text x="1212" y="164" fill="#A9C0DC" font-family="DejaVu Sans, Arial, sans-serif" font-size="19">LibTorch active now</text>
    <text x="1212" y="190" fill="#A9C0DC" font-family="DejaVu Sans, Arial, sans-serif" font-size="19">TensorRT intentionally stubbed</text>
    <text x="1212" y="228" fill="#84A0C2" font-family="DejaVu Sans, Arial, sans-serif" font-size="17">optional, not required in baseline</text>
  </g>
</svg>
