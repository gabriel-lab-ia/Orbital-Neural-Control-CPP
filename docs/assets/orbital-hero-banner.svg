<svg width="1600" height="620" viewBox="0 0 1600 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Orbital Neural Control CPP hero banner</title>
  <desc id="desc">Mission-control style orbital autonomy hero with Earth curvature, telemetry overlays, and reinforcement learning control signals.</desc>
  <defs>
    <linearGradient id="bg" x1="60" y1="20" x2="1540" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050B12"/>
      <stop offset="0.45" stop-color="#081521"/>
      <stop offset="1" stop-color="#060A10"/>
    </linearGradient>
    <radialGradient id="earthGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(780 730) rotate(90) scale(320 680)">
      <stop stop-color="#2B8CFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2B8CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arcA" x1="240" y1="470" x2="1390" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#49A3FF"/>
      <stop offset="1" stop-color="#39E1A6"/>
    </linearGradient>
    <linearGradient id="arcB" x1="340" y1="500" x2="1320" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D7DFF"/>
      <stop offset="1" stop-color="#70F0C4"/>
    </linearGradient>
    <linearGradient id="panel" x1="1040" y1="96" x2="1500" y2="486" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101D2C"/>
      <stop offset="1" stop-color="#0A131E"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="620" rx="28" fill="url(#bg)"/>

  <g opacity="0.22" stroke="#213549" stroke-width="1">
    <path d="M80 520H1520"/>
    <path d="M80 472H1520"/>
    <path d="M80 424H1520"/>
    <path d="M80 376H1520"/>
    <path d="M80 328H1520"/>
    <path d="M80 280H1520"/>
    <path d="M80 232H1520"/>
    <path d="M80 184H1520"/>
    <path d="M80 136H1520"/>
  </g>

  <g fill="#9EC1E5" opacity="0.5">
    <circle cx="180" cy="88" r="2"/>
    <circle cx="342" cy="62" r="1.5"/>
    <circle cx="486" cy="104" r="2"/>
    <circle cx="620" cy="70" r="1.6"/>
    <circle cx="872" cy="86" r="1.8"/>
    <circle cx="1042" cy="64" r="2"/>
    <circle cx="1218" cy="100" r="1.4"/>
    <circle cx="1368" cy="72" r="2"/>
    <circle cx="1492" cy="98" r="1.6"/>
