  <text x="92" y="118" fill="#3CDBA7" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">ORBITAL AUTONOMY + RL SYSTEMS ENGINEERING</text>
  <text x="92" y="202" fill="#EEF6FF" font-family="DejaVu Sans, Arial, sans-serif" font-size="62" font-weight="700">Orbital Neural Control CPP</text>
  <text x="92" y="258" fill="#B6CBE3" font-family="DejaVu Sans, Arial, sans-serif" font-size="28">C++20 mission simulation platform for autonomous control policy training and telemetry-driven validation.</text>
  <text x="92" y="296" fill="#93AECD" font-family="DejaVu Sans, Arial, sans-serif" font-size="23">PPO + LibTorch CPU, benchmarkable workflows, SQLite experiment tracking, and layered engineering architecture.</text>

