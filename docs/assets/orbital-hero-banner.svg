    <rect x="512" y="336" width="194" height="48" rx="24" fill="#0E1B2B" stroke="#2C4259"/>
    <rect x="720" y="336" width="208" height="48" rx="24" fill="#0E1B2B" stroke="#2C4259"/>
    <text x="132" y="367" fill="#DEEBFA" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="700">Orbital simulation</text>
    <text x="354" y="367" fill="#DEEBFA" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="700">PPO control</text>
    <text x="548" y="367" fill="#DEEBFA" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="700">Mission telemetry</text>
    <text x="758" y="367" fill="#DEEBFA" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="700">Repro benchmarks</text>
  </g>

  <g>
