  <path d="M60 560C270 492 512 462 794 462C1070 462 1314 492 1540 560" stroke="#3E95FF" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <path d="M180 482C360 382 590 318 812 304C1068 288 1260 332 1442 412" stroke="url(#arcA)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M248 514C442 420 620 368 802 354C1030 336 1208 370 1360 436" stroke="url(#arcB)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <g>
    <rect x="632" y="282" width="24" height="12" rx="3" fill="#84BFFF"/>
    <rect x="616" y="286" width="14" height="4" rx="2" fill="#6BA9E5"/>
    <rect x="658" y="286" width="14" height="4" rx="2" fill="#6BA9E5"/>
    <circle cx="644" cy="296" r="3" fill="#3DE0A7"/>
