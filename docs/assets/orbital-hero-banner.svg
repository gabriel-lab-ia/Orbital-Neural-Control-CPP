    <path d="M1092 206C1138 190 1186 176 1230 182C1272 188 1310 212 1358 210C1402 208 1432 186 1460 164" stroke="#46A0FF" stroke-width="3" stroke-linecap="round"/>

    <rect x="1068" y="248" width="404" height="80" rx="14" fill="#0A1421" stroke="#29435B"/>
    <text x="1092" y="279" fill="#B8CEE6" font-family="DejaVu Sans, Arial, sans-serif" font-size="17">orbit tracking residuals</text>
    <path d="M1092 300C1140 302 1180 286 1226 282C1270 278 1302 296 1344 304C1384 312 1422 304 1460 286" stroke="#38DEA4" stroke-width="3" stroke-linecap="round"/>

    <rect x="1068" y="342" width="404" height="128" rx="14" fill="#0A1421" stroke="#29435B"/>
    <text x="1092" y="374" fill="#D4E4F7" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="700">runtime channels</text>
    <text x="1092" y="402" fill="#9AB5D2" font-family="DejaVu Sans, Arial, sans-serif" font-size="16">train | eval | benchmark</text>
    <text x="1092" y="426" fill="#9AB5D2" font-family="DejaVu Sans, Arial, sans-serif" font-size="16">runs | episodes | events | reports</text>
    <text x="1092" y="450" fill="#9AB5D2" font-family="DejaVu Sans, Arial, sans-serif" font-size="16">CPU-first deterministic CI smoke path</text>
