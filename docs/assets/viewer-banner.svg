<svg width="1200" height="460" viewBox="0 0 1200 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">3D neural viewer banner</title>
  <desc id="desc">Visual banner for the browser-based 3D neural viewer.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="44" x2="1080" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#120F1F"/>
      <stop offset="0.55" stop-color="#1C1730"/>
      <stop offset="1" stop-color="#0E0C17"/>
    </linearGradient>
    <linearGradient id="mesh" x1="726" y1="104" x2="990" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2C15A"/>
      <stop offset="0.5" stop-color="#5CB8FF"/>
      <stop offset="1" stop-color="#73F2C2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="460" rx="28" fill="url(#bg)"/>
  <circle cx="914" cy="118" r="120" fill="#5CB8FF" opacity="0.10"/>
  <circle cx="244" cy="356" r="136" fill="#F2C15A" opacity="0.08"/>

  <text x="74" y="98" fill="#F2C15A" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">PUBLIC VIEWER</text>
  <text x="74" y="154" fill="#F7FBFF" font-family="DejaVu Sans, Arial, sans-serif" font-size="44" font-weight="700">Neural policy structure rendered as a 3D web artifact</text>
  <text x="74" y="198" fill="#CDBFE1" font-family="DejaVu Sans, Arial, sans-serif" font-size="24">Static HTML and JSON outputs expose graph topology, weights, and sampled live activations</text>
  <text x="74" y="230" fill="#CDBFE1" font-family="DejaVu Sans, Arial, sans-serif" font-size="24">for direct inspection on desktop and mobile without a backend service.</text>

  <g stroke="url(#mesh)" stroke-width="3.5" stroke-linecap="round" opacity="0.90">
    <path d="M748 138C782 156 804 182 828 214C848 240 874 274 912 294"/>
    <path d="M748 242C782 226 810 214 842 216C882 218 908 246 950 280"/>
    <path d="M748 344C780 310 810 284 846 280C888 275 922 294 972 326"/>
    <path d="M822 214C850 188 876 170 912 166C948 162 980 176 1016 204"/>
    <path d="M842 216C870 226 896 248 926 284"/>
    <path d="M846 280C872 268 900 268 930 280C964 294 996 322 1026 350"/>
  </g>

  <g fill="#101726" stroke="rgba(255,255,255,0.10)">
    <circle cx="728" cy="140" r="20"/>
    <circle cx="728" cy="242" r="20"/>
    <circle cx="728" cy="344" r="20"/>
    <circle cx="824" cy="214" r="20"/>
    <circle cx="844" cy="280" r="20"/>
    <circle cx="914" cy="164" r="20"/>
    <circle cx="930" cy="282" r="20"/>
    <circle cx="1026" cy="204" r="20"/>
    <circle cx="1036" cy="350" r="20"/>
  </g>

  <g fill="#EAF5FF" font-family="DejaVu Sans, Arial, sans-serif" font-size="18">
    <text x="700" y="394">policy nodes</text>
    <text x="840" y="394">hidden activations</text>
    <text x="1010" y="394">control outputs</text>
  </g>
</svg>
