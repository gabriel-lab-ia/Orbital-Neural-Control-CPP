name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y unzip wget

      - name: Download LibTorch CPU
        run: bash tools/setup_libtorch_cpu.sh

      - name: Configure baseline build
        run: cmake --preset dev -DNMC_TORCH_ROOT=$GITHUB_WORKSPACE/lib/libtorch

      - name: Build
        run: cmake --build --preset build
