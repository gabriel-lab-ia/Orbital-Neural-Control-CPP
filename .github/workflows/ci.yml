name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_GENERATOR: Ninja
  VCPKG_TARGET_TRIPLET: x64-linux
  VCPKG_HOST_TRIPLET: x64-linux
  VCPKG_FEATURE_FLAGS: manifests,binarycaching
  VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
  LIBTORCH_VARIANT: cpu
  TORCH_VERSION: 2.4.1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-linux:
    name: release-${{ matrix.os }}-${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        build_type: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential g++ ninja-build cmake curl zip unzip tar pkg-config \
            libsqlite3-dev python3

      - name: Setup CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
          ninjaVersion: "latest"

      - name: Setup vcpkg (pinned baseline)
        run: |
          set -euxo pipefail
          ./tools/setup_vcpkg.sh
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/external/vcpkg" >> "$GITHUB_ENV"
          echo "${GITHUB_WORKSPACE}/external/vcpkg" >> "$GITHUB_PATH"

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            external/vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-vcpkg-

      - name: Cache libtorch
        uses: actions/cache@v4
        with:
          path: third_party/libtorch
          key: ${{ runner.os }}-libtorch-${{ env.TORCH_VERSION }}-${{ env.LIBTORCH_VARIANT }}

      - name: Setup LibTorch prebuilt
        run: |
          set -euxo pipefail
          ./tools/setup_libtorch.sh

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-${{ matrix.build_type }}-build-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'vcpkg.json', 'src/**', 'rl/**', 'sim/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.build_type }}-build-

      - name: Configure
        run: |
          set -euxo pipefail
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_TOOLCHAIN_FILE=external/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${VCPKG_TARGET_TRIPLET} \
            -DVCPKG_HOST_TRIPLET=${VCPKG_HOST_TRIPLET} \
            -DVCPKG_FEATURE_FLAGS=${VCPKG_FEATURE_FLAGS} \
            -DENABLE_TENSORRT=ON \
            -DNMC_USE_LEGACY_VENDOR_DEPS=OFF

      - name: Build
        run: |
          set -euxo pipefail
          cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run smoke tests
        run: |
          set -euxo pipefail
          ctest --test-dir build --output-on-failure --verbose --no-tests=error \
            -R "nmc_smoke_benchmark|nmc_inference_parity"

      - name: Validate artifact integrity and finite metrics
        run: |
          set -euxo pipefail
          python3 scripts/validate_artifacts.py --root artifacts --strict
          python3 - <<'PY'
          import json
          import math
          from pathlib import Path

          bench = json.loads(Path("artifacts/benchmarks/latest.json").read_text(encoding="utf-8"))
          train_return = float(bench.get("train", {}).get("final_avg_episode_return", float("nan")))
          eval_return = float(bench.get("eval", {}).get("avg_episode_return", float("nan")))

          if not math.isfinite(train_return):
              raise SystemExit(f"train_return is not finite: {train_return}")
          if not math.isfinite(eval_return):
              raise SystemExit(f"eval_return is not finite: {eval_return}")

          print(f"[metrics] train_return={train_return:.6f} eval_return={eval_return:.6f}")
          PY

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts-${{ matrix.os }}-${{ matrix.build_type }}
          path: |
            artifacts/benchmarks/latest.json
            artifacts/benchmarks/latest.csv
            artifacts/latest/manifest.json
            artifacts/latest/checkpoint.pt
            artifacts/latest/checkpoint.meta
            artifacts/experiments.sqlite
