<svg width="1600" height="860" viewBox="0 0 1600 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PPO Mathematical Foundation</title>
  <desc id="desc">Policy ratio, clipped PPO objective, value and entropy terms, GAE estimator, and Gaussian continuous-control policy equations.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="24" x2="1560" y2="836" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1526"/>
      <stop offset="1" stop-color="#0A1220"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111D31"/>
      <stop offset="1" stop-color="#0E1829"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="accentCyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="accentPurple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .h1 { font-family: "Inter", "Segoe UI", Arial, sans-serif; font-size: 40px; font-weight: 700; fill: #F3F8FF; }
      .h2 { font-family: "Inter", "Segoe UI", Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #E9F2FF; }
      .eq { font-family: "JetBrains Mono", "Consolas", "SFMono-Regular", monospace; font-size: 23px; font-weight: 500; fill: #D7E7FF; }
      .sub { font-family: "Inter", "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #9FB3CE; }
      .chip { font-family: "Inter", "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #EAF3FF; }
    </style>
  </defs>

  <rect x="16" y="16" width="1568" height="828" rx="28" fill="url(#bg)" stroke="#26364E"/>

  <text x="54" y="82" class="h1">PPO Mathematical Foundation</text>
  <text x="54" y="116" class="sub">GitHub-safe equation rendering for policy optimization, value stabilization, and continuous control.</text>

  <rect x="54" y="152" width="1492" height="154" rx="20" fill="url(#panel)" stroke="#2A3D5A" filter="url(#soft)"/>
  <rect x="82" y="176" width="162" height="32" rx="8" fill="url(#accentBlue)"/>
  <text x="163" y="198" text-anchor="middle" class="chip">Policy Ratio</text>
  <text x="82" y="244" class="eq">r_t(theta) = pi_theta(a_t | s_t) / pi_theta_old(a_t | s_t)</text>
  <text x="82" y="278" class="sub">Compares how much more (or less) likely each sampled action is under the updated policy.</text>

  <rect x="54" y="330" width="1492" height="214" rx="20" fill="url(#panel)" stroke="#2A3D5A" filter="url(#soft)"/>
  <rect x="82" y="354" width="212" height="32" rx="8" fill="url(#accentCyan)"/>
  <text x="188" y="376" text-anchor="middle" class="chip">Clipped Objective</text>
  <text x="82" y="420" class="eq">L_clip(theta) = E_t[min(r_t(theta) * A_hat_t, clip(r_t(theta), 1-eps, 1+eps) * A_hat_t)]</text>
  <text x="82" y="455" class="eq">L_total = L_clip - c_v * (V_theta(s_t) - V_target_t)^2 + c_e * H(pi_theta(. | s_t))</text>
  <text x="82" y="491" class="sub">Value loss stabilizes critic fitting; entropy term prevents premature policy collapse.</text>

  <rect x="54" y="568" width="734" height="246" rx="20" fill="url(#panel)" stroke="#2A3D5A" filter="url(#soft)"/>
  <rect x="82" y="592" width="90" height="32" rx="8" fill="url(#accentPurple)"/>
  <text x="127" y="614" text-anchor="middle" class="chip">GAE</text>
  <text x="82" y="656" class="eq">delta_t = r_t + gamma * V(s_{t+1}) - V(s_t)</text>
  <text x="82" y="690" class="eq">A_hat_t = sum_{l=0}^{T-t-1} (gamma * lambda)^l * delta_{t+l}</text>
  <text x="82" y="724" class="eq">A_hat_t = delta_t + gamma * lambda * A_hat_{t+1}</text>
  <text x="82" y="760" class="sub">Lower-variance advantage estimate that keeps policy-gradient updates more stable.</text>

  <rect x="812" y="568" width="734" height="246" rx="20" fill="url(#panel)" stroke="#2A3D5A" filter="url(#soft)"/>
  <rect x="840" y="592" width="312" height="32" rx="8" fill="url(#accentBlue)"/>
  <text x="996" y="614" text-anchor="middle" class="chip">Continuous Gaussian Control</text>
  <text x="840" y="656" class="eq">a_t ~ N(mu_theta(s_t), sigma_theta(s_t)^2)</text>
  <text x="840" y="690" class="eq">policy head -> mu_theta(s_t), log_std head -> sigma_theta(s_t)</text>
  <text x="840" y="724" class="sub">Bounded log-std + PPO clipping reduces destructive jumps in control actions.</text>
  <text x="840" y="758" class="sub">This matches smooth stochastic actuation requirements for orbital-control style tasks.</text>
</svg>
